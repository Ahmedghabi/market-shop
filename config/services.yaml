imports:
    - { resource: parameters.yaml }

services:
    _defaults:
        autowire: true
        autoconfigure: true
        bind:
            string $oauth2Issuer: '%env(OAUTH2_ISSUER)%'
            string $oauth2Audience: '%env(OAUTH2_AUDIENCE)%'
            string $oauth2JwksUri: '%env(OAUTH2_JWKS_URI)%'
            string $appSecret: '%kernel.secret%'
            bool $kernelDebug: '%kernel.debug%'
            string $ollamaBaseUrl: '%env(OLLAMA_BASE_URL)%'
            'bool $globalEnabled': '%chatbot.global_enabled%'
            'array $modules': '%modules%'

    _instanceof:
        App\Service\Delivery\Connector\DeliveryProviderInterface:
            tags: ['app.delivery.connector']

    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    App\Service\Workflow\Transition\:
        resource: '../src/Service/Workflow/Transition/'
        tags: ['app.workflow.transition']

    App\Service\ImageService:
        arguments:
            $uploadDir: '%app.chat.upload_dir%'

    App\Service\MediaService:
        arguments:
            $uploadDir: '%app.chat.upload_dir%'
            $publicDir: '%kernel.project_dir%/public'

    App\Service\AppConfigService:
        arguments:
            $projectDir: '%kernel.project_dir%'

    App\Service\Boutique\SubdomainResolver:
        arguments:
            $rootDomain: '%env(ROOT_DOMAIN)%'

    App\Service\Boutique\ShopContext:
        arguments:
            $rootDomain: '%env(ROOT_DOMAIN)%'

    App\Service\Boutique\ReservedSlugRegistry:
        arguments:
            $additional: '%app.reserved_slugs%'

    App\Command\MediaCleanupCommand:
        arguments:
            $uploadDir: '%app.chat.upload_dir%'

    App\Service\Delivery\EncryptionService:
        arguments:
            $appSecret: '%kernel.secret%'

    App\State\Chat\MessageProcessor:
        arguments:
            $uploadDir: '%app.chat.upload_dir%'

    App\State\Common\FrontendBootstrapProvider:
        arguments:
            $projectDir: '%kernel.project_dir%'

    App\Config\CacheConfig:
        arguments:
            $cacheTtl: '%cache_ttl%'


